<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #27251F;
            --card-bg: #323029;
            --text-main: #f8fafc;
            --text-muted: #d1d5db;
            --accent-primary: #367C2B;
            --accent-secondary: #FFDE00;
            --success: #367C2B;
            --danger: #ef4444;
            --border: #444035;
            --hover-bg: #444035;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-weight: 600;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-size: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .progress-bar-bg {
            background: #334155;
            height: 6px;
            border-radius: 3px;
            margin-top: 12px;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            background: var(--accent-primary);
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            width: 300px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
        }

        button.btn-refresh {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button.btn-refresh:hover {
            opacity: 0.9;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        th {
            background: transparent;
            padding: 16px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: var(--hover-bg);
        }

        .btn-kill {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-kill:hover {
            background: var(--danger);
            color: white;
        }

        .memory {
            font-family: monospace;
        }

        .pid {
            color: var(--text-muted);
            font-family: monospace;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-running {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .status-stopped {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-sleeping {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>System Monitor Pro</h1>
                <div style="font-size: 0.9rem; color: var(--text-muted); font-style: italic; margin-top: 4px;">nothing
                    runs like a deere</div>
            </div>
            <div id="connection-status" style="font-size: 0.8rem; color: var(--success);">● Live</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">CPU Usage</div>
                <div class="stat-value" id="cpu-val">0%</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="cpu-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Memory Usage</div>
                <div class="stat-value" id="mem-val">0%</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="mem-bar" style="width: 0%; background: var(--accent-secondary);">
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Threads</div>
                <div class="stat-value" id="threads-val">0</div>
            </div>
        </div>

        <div class="toolbar">
            <input type="text" id="search-input" placeholder="Search processes...">
            <button class="btn-refresh" id="refresh-btn">Refresh</button>
            <button class="btn-refresh" id="run-btn"
                style="background: var(--accent-secondary); color: var(--bg-color);">Run New Task</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('pid')">PID ↕</th>
                        <th onclick="sortTable('name')">Name ↕</th>
                        <th onclick="sortTable('username')">User ↕</th>
                        <th onclick="sortTable('status')">Status ↕</th>
                        <th onclick="sortTable('cpu')">CPU % ↕</th>
                        <th onclick="sortTable('memory')">Memory (MB) ↕</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="process-list">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentProcesses = [];
        let sortCol = 'memory';
        let sortAsc = false;

        async function updateDashboard() {
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();

                document.getElementById('cpu-val').innerText = stats.cpu_percent + '%';
                document.getElementById('cpu-bar').style.width = stats.cpu_percent + '%';

                document.getElementById('mem-val').innerText = stats.memory_percent + '%';
                document.getElementById('mem-bar').style.width = stats.memory_percent + '%';

                document.getElementById('threads-val').innerText = stats.total_threads;

            } catch (err) {
                console.error("Stats error", err);
            }
        }

        async function fetchProcesses() {
            try {
                const response = await fetch('/api/processes');
                currentProcesses = await response.json();
                renderTable();
            } catch (error) {
                console.error('Error fetching processes:', error);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('process-list');
            const term = document.getElementById('search-input').value.toLowerCase();

            let filtered = currentProcesses.filter(p =>
                p.name.toLowerCase().includes(term) ||
                String(p.pid).includes(term)
            );

            filtered.sort((a, b) => {
                let valA, valB;
                if (sortCol === 'memory') { valA = a.memory_val; valB = b.memory_val; }
                else if (sortCol === 'cpu') { valA = a.cpu_percent; valB = b.cpu_percent; }
                else { valA = a[sortCol]; valB = b[sortCol]; }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = filtered.map(proc => `
                <tr>
                    <td class="pid">${proc.pid}</td>
                    <td style="font-weight: 500;">${proc.name}</td>
                    <td style="color: var(--text-muted);">${proc.username || '-'}</td>
                    <td><span class="status-badge ${getStatusClass(proc.status)}">${proc.status}</span></td>
                    <td>${proc.cpu_percent.toFixed(1)}%</td>
                    <td class="memory">${proc.memory_mb}</td>
                    <td>
                        <button class="btn-kill" onclick="killProcess(${proc.pid}, '${proc.name}')">Terminate</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'running') return 'status-running';
            if (status === 'stopped') return 'status-stopped';
            return 'status-sleeping';
        }

        function sortTable(col) {
            if (sortCol === col) sortAsc = !sortAsc;
            else {
                sortCol = col;
                sortAsc = true;
                if (col === 'memory' || col === 'cpu') sortAsc = false;
            }
            renderTable();
        }

        async function killProcess(pid, name) {
            if (!confirm(`Are you sure you want to terminate ${name} (PID ${pid})?`)) return;

            try {
                const res = await fetch(`/api/kill/${pid}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                    fetchProcesses();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        async function runProgram() {
            const cmd = prompt("Enter program name or command (e.g., 'notepad', 'calc', 'excel'):");
            if (!cmd) return;

            try {
                const res = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Request failed');
            }
        }

        document.getElementById('search-input').addEventListener('input', renderTable);
        document.getElementById('refresh-btn').addEventListener('click', () => {
            fetchProcesses();
            updateDashboard();
        });
        document.getElementById('run-btn').addEventListener('click', runProgram);

        setInterval(() => {
            fetchProcesses();
            updateDashboard();
        }, 3000);

        fetchProcesses();
        updateDashboard();

    </script>
</body>

</html>
