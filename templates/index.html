<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #27251F;
            --card-bg: #323029;
            --text-main: #f8fafc;
            --text-muted: #d1d5db;
            --accent-primary: #367C2B;
            --accent-secondary: #FFDE00;
            --success: #367C2B;
            --danger: #ef4444;
            --border: #444035;
            --hover-bg: #444035;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-weight: 600;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-size: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: transparent;
            padding: 20px;
            border-radius: 12px;
            box-shadow: none;
            border: none;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto;
        }

        .circular-chart {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.4));
        }

        .circle {
            fill: none;
            stroke-width: 5;
            stroke-linecap: butt;
            /* Flat ends like in the image */
            transition: stroke-dasharray 0.5s ease;
        }

        .circle-cpu {
            stroke: var(--accent-primary);
        }

        .circle-mem {
            stroke: var(--accent-secondary);
        }

        .circle-threads {
            stroke: #7bd0858b;
        }

        .chart-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .chart-value {
            font-size: 3rem;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1;
        }

        .chart-label {
            color: var(--text-muted);
            font-size: 1.25rem;
            text-align: center;
            margin-top: 6px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            width: 300px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
        }

        button.btn-refresh {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button.btn-refresh:hover {
            opacity: 0.9;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead tr {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
        }

        th {
            background: transparent;
            padding: 16px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: var(--hover-bg);
        }

        .btn-kill {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-kill:hover {
            background: var(--danger);
            color: white;
        }

        .memory {
            font-family: monospace;
        }

        .pid {
            color: var(--text-muted);
            font-family: monospace;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-running {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .status-stopped {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-sleeping {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1 id="app-title">System Monitor Pro</h1>
                <div id="app-subtitle" style="font-size: 0.9rem; color: var(--text-muted); font-style: italic; margin-top: 4px;">nothing
                    runs like a deere</div>
            </div>
            <div id="connection-status" style="font-size: 0.8rem; color: var(--success);">● Live</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="chart-container">
                    <svg viewBox="-3 -3 42 42" class="circular-chart">
                        <path class="circle circle-cpu" id="cpu-circle" stroke-dasharray="0, 100"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="chart-content">
                        <div class="chart-value" id="cpu-val">0%</div>
                        <div class="chart-label" id="lbl-cpu">CPU</div>
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div class="chart-container">
                    <svg viewBox="-3 -3 42 42" class="circular-chart">
                        <path class="circle circle-mem" id="mem-circle" stroke-dasharray="0, 100"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="chart-content">
                        <div class="chart-value" id="mem-val">0%</div>
                        <div class="chart-label" id="lbl-mem">Memory</div>
                    </div>
                </div>
            </div>
            <div class="stat-card">
                <div class="chart-container">
                    <svg viewBox="-3 -3 42 42" class="circular-chart">
                        <path class="circle circle-threads" id="threads-circle" stroke-dasharray="0, 100"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="chart-content">
                        <div class="chart-value" id="threads-val">0</div>
                        <div class="chart-label" id="lbl-thr">Threads</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <input type="text" id="search-input" placeholder="Search processes...">
            <button class="btn-refresh" id="refresh-btn">Refresh</button>
            <button class="btn-refresh" id="run-btn"
                style="background: var(--accent-secondary); color: var(--bg-color);">Run New Task</button>
            <select id="lang-select" class="btn-refresh" style="background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); outline: none;">
                <option value="en">English</option>
                <option value="bg">Български</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th id="th-pid" onclick="sortTable('pid')">PID ↕</th>
                        <th id="th-name" onclick="sortTable('name')">Name ↕</th>
                        <th id="user-header" onclick="sortTable('username')">User (All) ↕</th>
                        <th id="th-status" onclick="sortTable('status')">Status ↕</th>
                        <th id="th-cpu" onclick="sortTable('cpu')">CPU % ↕</th>
                        <th id="th-memory" onclick="sortTable('memory')">Memory (MB) ↕</th>
                        <th id="th-actions">Actions</th>
                    </tr>
                </thead>
                <tbody id="process-list">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentProcesses = [];
        let sortCol = 'memory';
        let sortAsc = false;

        const translations = {
            en: {
                title: "System Monitor Pro",
                subtitle: "nothing runs like a deere",
                live: "● Live",
                cpu: "CPU",
                memory: "Memory",
                threads: "Threads",
                search_placeholder: "Search processes...",
                refresh: "Refresh",
                run_task: "Run New Task",
                pid: "PID ↕",
                name: "Name ↕",
                user_all: "User (All) ↕",
                user_active: "User (Active Only) ↕",
                status: "Status ↕",
                cpu_percent: "CPU % ↕",
                memory_mb: "Memory (MB) ↕",
                actions: "Actions",
                terminate: "Terminate",
                confirm_kill: "Are you sure you want to terminate {name} (PID {pid})?",
                prompt_cmd: "Enter program name or command (e.g., 'notepad', 'calc', 'excel'):",
                error: "Error: ",
                req_failed: "Request failed"
            },
            bg: {
                title: "Системен Монитор Pro",
                subtitle: "нищо не върви като еленче",
                live: "● На живо",
                cpu: "Процесор",
                memory: "Памет",
                threads: "Нишки",
                search_placeholder: "Търсене на процеси...",
                refresh: "Обновяване",
                run_task: "Нова Задача",
                pid: "PID ↕",
                name: "Име ↕",
                user_all: "Потребител (Всички) ↕",
                user_active: "Потребител (Само Активни) ↕",
                status: "Състояние ↕",
                cpu_percent: "CPU % ↕",
                memory_mb: "Памет (MB) ↕",
                actions: "Действия",
                terminate: "Прекрати",
                confirm_kill: "Сигурни ли сте, че искате да прекратите {name} (PID {pid})?",
                prompt_cmd: "Въведете име на програма или команда (напр. 'notepad', 'calc', 'excel'):",
                error: "Грешка: ",
                req_failed: "Заявката се провали"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        function t(key) { return translations[currentLang][key] || key; }

        function updateLang() {
            document.getElementById('app-title').innerText = t('title');
            document.getElementById('app-subtitle').innerText = t('subtitle');
            document.getElementById('connection-status').innerText = t('live');
            
            document.getElementById('lbl-cpu').innerText = t('cpu');
            document.getElementById('lbl-mem').innerText = t('memory');
            document.getElementById('lbl-thr').innerText = t('threads');
            
            document.getElementById('search-input').placeholder = t('search_placeholder');
            document.getElementById('refresh-btn').innerText = t('refresh');
            document.getElementById('run-btn').innerText = t('run_task');
            
            document.getElementById('th-pid').innerText = t('pid');
            document.getElementById('th-name').innerText = t('name');
            document.getElementById('user-header').innerText = filterActiveUser ? t('user_active') : t('user_all');
            document.getElementById('th-status').innerText = t('status');
            document.getElementById('th-cpu').innerText = t('cpu_percent');
            document.getElementById('th-memory').innerText = t('memory_mb');
            document.getElementById('th-actions').innerText = t('actions');
            
            renderTable();
        }

        async function updateDashboard() {
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();

                document.getElementById('cpu-val').innerText = stats.cpu_percent + '%';
                document.getElementById('cpu-circle').setAttribute('stroke-dasharray', `${stats.cpu_percent}, 100`);

                document.getElementById('mem-val').innerText = stats.memory_percent + '%';
                document.getElementById('mem-circle').setAttribute('stroke-dasharray', `${stats.memory_percent}, 100`);

                document.getElementById('threads-val').innerText = stats.total_threads;
                const threadPercent = Math.min((stats.total_threads / 10000) * 100, 100);
                document.getElementById('threads-circle').setAttribute('stroke-dasharray', `${threadPercent}, 100`);

            } catch (err) {
                console.error("Stats error", err);
            }
        }

        async function fetchProcesses() {
            try {
                const response = await fetch('/api/processes');
                currentProcesses = await response.json();
                renderTable();
            } catch (error) {
                console.error('Error fetching processes:', error);
            }
        }

        let filterActiveUser = false;
        let activeUserName = '';

        function renderTable() {
            const tbody = document.getElementById('process-list');
            const term = document.getElementById('search-input').value.toLowerCase();

            let filtered = currentProcesses.filter(p =>
                p.name.toLowerCase().includes(term) ||
                String(p.pid).includes(term)
            );

            if (filterActiveUser && activeUserName) {
                filtered = filtered.filter(p => p.username === activeUserName);
            }

            filtered.sort((a, b) => {
                let valA, valB;
                if (sortCol === 'memory') { valA = a.memory_val; valB = b.memory_val; }
                else if (sortCol === 'cpu') { valA = a.cpu_percent; valB = b.cpu_percent; }
                else { valA = a[sortCol]; valB = b[sortCol]; }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = filtered.map(proc => `
                <tr>
                    <td class="pid">${proc.pid}</td>
                    <td style="font-weight: 500;">${proc.name}</td>
                    <td style="color: var(--text-muted);">${proc.username || '-'}</td>
                    <td><span class="status-badge ${getStatusClass(proc.status)}">${getTranslatedStatus(proc.status)}</span></td>
                    <td>${proc.cpu_percent.toFixed(1)}%</td>
                    <td class="memory">${proc.memory_mb}</td>
                    <td>
                        <button class="btn-kill" onclick="killProcess(${proc.pid}, '${proc.name}')">${t('terminate')}</button>
                    </td>
                </tr>
            `).join('');
        }

        function getTranslatedStatus(status) {
            if (currentLang === 'bg') {
                if (status === 'running') return 'работи';
                if (status === 'stopped') return 'спрян';
                if (status === 'sleeping') return 'спи';
            }
            return status;
        }

        function getStatusClass(status) {
            if (status === 'running') return 'status-running';
            if (status === 'stopped') return 'status-stopped';
            return 'status-sleeping';
        }

        function sortTable(col) {
            if (col === 'username') {
                filterActiveUser = !filterActiveUser;
                const header = document.getElementById('user-header');
                if (filterActiveUser) {
                    header.innerText = t('user_active');

                    if (!activeUserName && currentProcesses.length > 0) {
                        const explorerProc = currentProcesses.find(p => p.name.toLowerCase() === 'explorer.exe');
                        if (explorerProc) activeUserName = explorerProc.username;
                    }
                } else {
                    header.innerText = t('user_all');
                }
            } else {
                if (sortCol === col) sortAsc = !sortAsc;
                else {
                    sortCol = col;
                    sortAsc = true;
                    if (col === 'memory' || col === 'cpu') sortAsc = false;
                }
            }
            renderTable();
        }

        async function killProcess(pid, name) {
            if (!confirm(t('confirm_kill').replace('{name}', name).replace('{pid}', pid))) return;

            try {
                const res = await fetch(`/api/kill/${pid}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                    fetchProcesses();
                } else {
                    alert(t('error') + data.message);
                }
            } catch (err) {
                alert(t('req_failed'));
            }
        }

        async function runProgram() {
            const cmd = prompt(t('prompt_cmd'));
            if (!cmd) return;

            try {
                const res = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await res.json();
                if (data.success) {
                    alert(data.message);
                } else {
                    alert(t('error') + data.message);
                }
            } catch (err) {
                alert(t('req_failed'));
            }
        }

        document.getElementById('search-input').addEventListener('input', renderTable);
        
        document.getElementById('lang-select').value = currentLang;
        document.getElementById('lang-select').addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('lang', currentLang);
            updateLang();
        });
        updateLang();

        document.getElementById('refresh-btn').addEventListener('click', () => {
            fetchProcesses();
            updateDashboard();
        });
        document.getElementById('run-btn').addEventListener('click', runProgram);

        setInterval(() => {
            fetchProcesses();
            updateDashboard();
        }, 3000);

        fetchProcesses();
        updateDashboard();

    </script>
</body>

</html>
